<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#000000">

  <title>みる</title>

  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      margin: 0;
      padding: 0;
      background: #fafafa;
    }

    #ui {
      margin-top: 18vh;
    }

    h1 {
      font-size: 2.6rem;
      margin-bottom: 2.5rem;
    }

    #folderInput {
      font-size: 1.6rem;
      margin-bottom: 2rem;
    }

    #startBtn {
      font-size: 1.8rem;
      padding: 1rem 2.5rem;
      margin-top: 1rem;
    }

    #help {
      display: none;
      font-size: 1.4rem;
      margin-top: 2rem;
      color: #555;
    }

    #viewer {
      display: none;
    }

    #slide {
      width: 100vw;
      height: 100vh;
      object-fit: contain;
      background: black;
    }
  </style>
</head>

<body>

  <div id="ui">
    <h1>みる</h1>

    <input id="folderInput" type="file" webkitdirectory directory allowdirs>

    <button id="startBtn">再生開始</button>

    <div id="help">スワイプで次へ進みます</div>
  </div>

  <div id="viewer">
    <img id="slide">
  </div>

  <!-- フェード用マスク -->
  <div id="fadeMask" style="
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background: black;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  "></div>

  <!-- 操作バー -->
  <div id="controls" style="
    position: fixed;
    bottom: 10px;
    width: 100%;
    text-align: center;
    font-size: 2rem;
    color: white;
    background: rgba(0,0,0,0.5);
    z-index: 9999;
  ">
    <span id="prev">⇦</span>
    <span id="pause">⏸</span>
    <span id="nextBtn">⇨</span>
    <span id="restart">↺もどる</span>
  </div>

  <script src="app.js"></script>
</body>
</html>
