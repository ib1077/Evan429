<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#000000">

  <title>みる</title>

  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      margin: 0;
      padding: 0;
      background: #fafafa;
    }

    #ui {
      margin-top: 18vh;
    }

    h1 {
      font-size: 2.6rem;
      margin-bottom: 2.5rem;
    }

    #folderInput {
      font-size: 1.6rem;
      margin-bottom: 2rem;
    }

    #startBtn {
      font-size: 1.8rem;
      padding: 1rem 2.5rem;
      margin-top: 1rem;
    }

    #help {
      display: none;
      font-size: 1.4rem;
      margin-top: 2rem;
      color: #555;
    }

    #viewer {
      display: none;
    }

    #slide {
      width: 100vw;
      height: 100vh;
      object-fit: contain;
      background: black;
    }
  </style>
</head>

<body>

  <div id="ui">
    <h1>みる</h1>

    <input id="folderInput" type="file" webkitdirectory directory allowdirs>

    <button id="startBtn">再生開始</button>

    <div id="help">スワイプで次へ進みます</div>

    <!-- 説明文 -->
    <div id="info" style="
      margin-top: 3rem;
      font-size: 1.2rem;
      color: #666;
      line-height: 1.8;
    ">
      🐤選択したフォルダの画像がすてきなスライドショーになるよ。<br>
      🐤フォルダの画像を表示するだけです。アプリ終了するとデータは残りません。外部に通信はしません。<br>
      🐤15秒で変わります。長い動画は一時停止してみてね。
    </div>
  </div>

  <div id="viewer">
    <img id="slide">
  </div>

  <!-- フェード用マスク -->
  <div id="fadeMask" style="
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background: black;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.8s;
  "></div>

  <!-- 動画の音声アイコン（控えめ） -->
  <div id="videoSound" style="
    position: fixed;
    bottom: 80px;
    right: 20px;
    font-size: 1.6rem;
    color: #aaa;
    display: none;
    z-index: 9999;
  ">🔊</div>

  <!-- 操作バー -->
  <div id="controls" style="
    position: fixed;
    bottom: 10px;
    width: 100%;
    text-align: center;
    font-size: 2rem;
    color: #ccc;
    background: rgba(0,0,0,0.3);
    z-index: 9999;
  ">
    <span id="prev" style="margin: 0 1.5rem;">⇦</span>
    <span id="pause" style="margin: 0 1.5rem;">⏸</span>
    <span id="nextBtn" style="margin: 0 1.5rem;">⇨</span>
  </div>

  <script src="app.js"></script>
</body>
</html>
